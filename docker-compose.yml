services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-server
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
      - ./templates:/templates
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    # Active model: LiquidAI LFM2.5-8B-A1B (1B-active MoE), THINKING mode.
    # Uses its own embedded chat template (no --chat-template-file). Thinking is
    # ON: the model reasons before emitting the JSON, which is what makes it
    # populate the full fact triple + evidence (nothink/--reasoning-budget 0
    # leaves those fields empty). Cost: ~5-7k tokens of reasoning per round
    # (~45-60s/round) vs nothink's ~10s. No MTP head -> no spec-decode flags.
    # App sampling is LFM-tuned (app.py).
    command: >
      --model /models/LFM2.5-8B-A1B-Q4_K_M.gguf
      --host 0.0.0.0
      --port 8080
      --ctx-size 16384
      --parallel 1
      --flash-attn 1
      --threads 8
      --n-gpu-layers 999
      --n-predict 8192
      --jinja
      --cache-reuse 256
    # --- To revert to Qwen3.6-35B-A3B Q3 + MTP (higher quality, verbatim
    # --- grounding; also set app.py sampling back to temp0.7/presence_penalty1.5):
    #   --model /models/Qwen3.6-35B-A3B-UD-Q3_K_XL.gguf
    #   --host 0.0.0.0 --port 8080 --ctx-size 16384 --parallel 1 --flash-attn 1
    #   --no-mmap --threads 8 --spec-type draft-mtp --spec-draft-n-max 3
    #   --spec-draft-p-min 0.1 --n-predict 8192 --jinja
    #   --chat-template-file /templates/chat_template.jinja -fitt 512 --cache-reuse 256

  ki-extractor:
    build: .
    container_name: ki-extractor
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - LLAMA_URL=http://llama-server:8080
      - CUDA_VISIBLE_DEVICES=
      - TOKENIZERS_PARALLELISM=false
    depends_on:
      - llama-server
    restart: unless-stopped
